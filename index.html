<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Manager</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◆</text></svg>">
<script>
// Apply the saved theme before first paint to avoid a flash.
try {
  var s = JSON.parse(localStorage.getItem('lifeman.settings.v1')) || {};
  var dark = s.theme === 'dark' ||
    ((s.theme || 'system') === 'system' && matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.dataset.theme = dark ? 'dark' : 'light';
} catch (e) {}
</script>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/tasks.css">
<link rel="stylesheet" href="css/calendar.css">
<link rel="stylesheet" href="css/habits.css">
<link rel="stylesheet" href="css/goals.css">
<link rel="stylesheet" href="css/journal.css">
<link rel="stylesheet" href="css/focus.css">
<link rel="stylesheet" href="css/contacts.css">
<link rel="stylesheet" href="css/reading.css">
<link rel="stylesheet" href="css/finance.css">
<link rel="stylesheet" href="css/bookmarks.css">
<link rel="stylesheet" href="css/trips.css">
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#faf6ec" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#262019" media="(prefers-color-scheme: dark)">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="LIFE·MGR">
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">LIFE·MGR</div>
    <nav>
      <a href="#/dashboard" data-route="dashboard">today</a>
      <a href="#/tasks" data-route="tasks">tasks</a>
      <a href="#/calendar" data-route="calendar">calendar</a>
      <a href="#/habits" data-route="habits">habits</a>
      <a href="#/goals" data-route="goals">goals</a>
      <a href="#/journal" data-route="journal">journal</a>
      <a href="#/contacts" data-route="contacts">contacts</a>
      <a href="#/reading" data-route="reading">reading</a>
      <a href="#/finance" data-route="finance">finance</a>
      <a href="#/bookmarks" data-route="bookmarks">links</a>
      <a href="#/trips" data-route="trips">trips</a>
      <a href="#/settings" data-route="settings">settings</a>
    </nav>
    <div class="sidebar-foot hint">github-backed · local-first</div>
  </aside>
  <div class="main-col">
    <header class="topbar">
      <div class="search-wrap">
        <input id="global-search" placeholder="Search everything…  ( / )" autocomplete="off">
        <div id="search-results" class="search-results" hidden></div>
      </div>
      <span class="spacer"></span>
      <button id="quick-add-btn" class="primary-btn" title="New item (n)">+ New</button>
      <button id="focus-btn" class="icon-btn" title="Focus mode (f)">◎</button>
      <button id="theme-toggle" class="icon-btn" title="Toggle light/dark">◐</button>
      <span id="sync-status" class="sync-status" data-status="local" title="Sync status — click for settings">local only</span>
    </header>
    <main id="view"></main>
  </div>
</div>
<datalist id="project-list"></datalist>
<div id="modal-root"></div>
<div id="toast-root"></div>
<script type="module" src="js/app.js"></script>
</body>
</html>
